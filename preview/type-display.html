<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#1b193c; padding:26px 28px; color:#fdfbf7; }
  .kick { font-size:12px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:#f0c68c; margin-bottom:14px; }
  h1 { font-size:58px; font-weight:800; letter-spacing:-.03em; line-height:1.02; }
  .script { font-style:italic; font-weight:500; color:#f0c68c; }
  .note { margin-top:14px; font-size:12px; color:rgba(253,251,247,.55); }
</style>
</head>
<body>
  <div class="kick">Negócios · Inovação · Tecnologia</div>
  <h1>Onde conexão<br>vira <span class="script">negócio</span>.</h1>
  <div class="note">Poppins ExtraBold 800 · tracking −0.03em · the "hub" script = Poppins italic 500, gold</div>
</body>
</html>
