<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:24px; display:flex; gap:22px; align-items:flex-end; flex-wrap:wrap; }
  .col { text-align:center; }
  .box { background:#fff; border:1px solid #e7e0d6; width:96px; height:72px; }
  .lbl { font-size:11px; color:#4b4866; margin-top:9px; font-weight:600; }
  .sm { box-shadow:0 1px 2px rgba(27,25,60,.06),0 2px 6px rgba(27,25,60,.06); }
  .md { box-shadow:0 6px 18px rgba(27,25,60,.10),0 2px 6px rgba(27,25,60,.06); }
  .lg { box-shadow:0 18px 48px rgba(27,25,60,.16),0 6px 16px rgba(27,25,60,.08); }
  .gold { background:#f0c68c; border:0; box-shadow:0 14px 40px rgba(217,165,95,.45); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:6px"></div><div class="lbl">xs · 6px</div></div>
  <div class="col"><div class="box" style="border-radius:16px"></div><div class="lbl">md · 16px</div></div>
  <div class="col"><div class="box" style="border-radius:24px"></div><div class="lbl">lg · 24px</div></div>
  <div class="col"><div class="box sm" style="border-radius:16px"></div><div class="lbl">shadow-sm</div></div>
  <div class="col"><div class="box md" style="border-radius:16px"></div><div class="lbl">shadow-md</div></div>
  <div class="col"><div class="box lg" style="border-radius:16px"></div><div class="lbl">shadow-lg</div></div>
  <div class="col"><div class="box gold" style="border-radius:16px"></div><div class="lbl">shadow-gold</div></div>
</body>
</html>
