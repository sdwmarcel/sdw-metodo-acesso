<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:24px 26px; color:#1b193c; }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .bar { height:14px; border-radius:4px; background:linear-gradient(90deg,#492b92,#843558); }
  .t { font-size:11.5px; font-weight:600; width:96px; flex:0 0 auto; color:#4b4866; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row"><span class="t">2 · 8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="t">4 · 16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="t">5 · 24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="t">6 · 32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="t">7 · 48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="t">8 · 64px</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="t">9 · 96px</span><span class="bar" style="width:96px"></span></div>
  <div class="row"><span class="t">10 · 128px</span><span class="bar" style="width:128px"></span></div>
</body>
</html>
