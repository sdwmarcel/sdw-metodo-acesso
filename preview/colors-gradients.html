<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:22px; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  .g { height:118px; border-radius:16px; display:flex; align-items:flex-end; padding:12px; box-shadow:0 6px 18px rgba(27,25,60,.14); }
  .lbl { font-size:11.5px; font-weight:600; color:#fdfbf7; text-shadow:0 1px 4px rgba(0,0,0,.35); }
  .lbl.ink { color:#3c165d; text-shadow:none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="g" style="background:linear-gradient(115deg,#3c165d 0%,#492b92 28%,#6c2164 52%,#843558 70%,#0f96ab 100%)"><span class="lbl">grad-brand</span></div>
    <div class="g" style="background:radial-gradient(120% 120% at 15% 10%,#492b92 0%,#3c165d 40%,#1b193c 100%)"><span class="lbl">grad-aurora</span></div>
    <div class="g" style="background:linear-gradient(120deg,#843558 0%,#6c2164 45%,#492b92 100%)"><span class="lbl">grad-warm</span></div>
    <div class="g" style="background:linear-gradient(110deg,#f7e2c2 0%,#f0c68c 50%,#d9a55f 100%)"><span class="lbl ink">grad-gold</span></div>
    <div class="g" style="background:linear-gradient(125deg,#0f96ab 0%,#236d98 35%,#492b92 100%)"><span class="lbl">grad-cyan-purple</span></div>
  </div>
</body>
</html>
