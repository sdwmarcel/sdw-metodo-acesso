<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#1b193c; padding:26px; display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  .btn { font-family:inherit; font-size:15px; font-weight:600; padding:14px 26px; border-radius:999px; border:0; cursor:pointer; letter-spacing:-.01em; }
  .primary { background:#f0c68c; color:#3c165d; box-shadow:0 14px 40px rgba(217,165,95,.4); }
  .ghost { background:transparent; color:#fdfbf7; border:1.5px solid rgba(240,198,140,.5); }
  .solid-purple { background:#492b92; color:#fdfbf7; }
  .text { background:transparent; color:#f0c68c; padding:14px 6px; }
  .text span { border-bottom:1.5px solid rgba(240,198,140,.4); padding-bottom:2px; }
</style>
</head>
<body>
  <button class="btn primary">Garanta seu ingresso</button>
  <button class="btn ghost">Ver programação</button>
  <button class="btn solid-purple">Seja patrocinador</button>
  <button class="btn text"><span>Fale com a equipe →</span></button>
</body>
</html>
