<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:22px; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  .sw { border-radius:14px; height:96px; display:flex; align-items:flex-end; padding:10px; box-shadow:0 4px 14px rgba(27,25,60,.10); }
  .meta { font-size:11px; line-height:1.35; }
  .name { font-weight:600; letter-spacing:-.01em; }
  .hex { opacity:.8; font-weight:500; font-variant-numeric:tabular-nums; }
  .lt { color:#1b193c; } .dk { color:#fdfbf7; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw dk" style="background:#1b193c"><div class="meta"><div class="name">dark-blue</div><div class="hex">#1b193c</div></div></div>
    <div class="sw dk" style="background:#3c165d"><div class="meta"><div class="name">purple-dark</div><div class="hex">#3c165d</div></div></div>
    <div class="sw dk" style="background:#492b92"><div class="meta"><div class="name">purple</div><div class="hex">#492b92</div></div></div>
    <div class="sw dk" style="background:#6c2164"><div class="meta"><div class="name">rose-dark</div><div class="hex">#6c2164</div></div></div>
    <div class="sw dk" style="background:#843558"><div class="meta"><div class="name">rose</div><div class="hex">#843558</div></div></div>
    <div class="sw dk" style="background:#692929"><div class="meta"><div class="name">red</div><div class="hex">#692929</div></div></div>
    <div class="sw dk" style="background:#236d98"><div class="meta"><div class="name">blue</div><div class="hex">#236d98</div></div></div>
    <div class="sw dk" style="background:#4a85b6"><div class="meta"><div class="name">blue-light</div><div class="hex">#4a85b6</div></div></div>
    <div class="sw dk" style="background:#0f96ab"><div class="meta"><div class="name">cyan</div><div class="hex">#0f96ab</div></div></div>
    <div class="sw lt" style="background:#f0c68c"><div class="meta"><div class="name">cream/gold</div><div class="hex">#f0c68c</div></div></div>
  </div>
</body>
</html>
