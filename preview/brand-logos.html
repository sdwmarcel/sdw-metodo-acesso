<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; box-sizing:border-box; }
  body { background:#fbf8f3; padding:20px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .tile { height:118px; border-radius:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(27,25,60,.1); }
  .tile img { width:62%; height:auto; }
  .dark { background:#1b193c; }
  .light { background:#fbf8f3; border:1px solid #e7e0d6; }
  .grad { background:linear-gradient(115deg,#3c165d,#843558 60%,#0f96ab); }
</style>
</head>
<body>
  <div class="tile light"><img src="../assets/sdw-logo-purple.png" alt="purple"></div>
  <div class="tile dark"><img src="../assets/sdw-logo-gold.png" alt="gold"></div>
  <div class="tile grad"><img src="../assets/sdw-logo-white.png" alt="white"></div>
  <div class="tile" style="padding:0;overflow:hidden"><img src="../assets/sdw-logo-color.jpeg" style="width:100%;height:100%;object-fit:cover" alt="color lockup"></div>
</body>
</html>
