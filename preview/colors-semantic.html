<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:22px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .panel { border-radius:16px; padding:16px 18px; }
  .light { background:#fbf8f3; border:1px solid #e7e0d6; }
  .dark { background:#1b193c; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .dot { width:18px; height:18px; border-radius:6px; flex:0 0 auto; }
  .t1 { font-size:13px; font-weight:600; }
  .t2 { font-size:11px; opacity:.7; }
  .on-l { color:#1b193c; } .on-d { color:#fdfbf7; }
  h4 { font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; margin-bottom:12px; font-weight:600; }
</style>
</head>
<body>
  <div class="panel light">
    <h4 style="color:#4b4866">On light · paper #fbf8f3</h4>
    <div class="row"><span class="dot" style="background:#1b193c"></span><span class="t1 on-l">fg-1 — primary ink</span></div>
    <div class="row"><span class="dot" style="background:#4b4866"></span><span class="t1 on-l">fg-2 — secondary</span></div>
    <div class="row"><span class="dot" style="background:#492b92"></span><span class="t1 on-l">brand purple — links</span></div>
    <div class="row"><span class="dot" style="background:#f0c68c"></span><span class="t1 on-l">accent gold — CTA</span></div>
  </div>
  <div class="panel dark">
    <h4 style="color:rgba(253,251,247,.6)">On dark · indigo #1b193c</h4>
    <div class="row"><span class="dot" style="background:#fdfbf7"></span><span class="t1 on-d">fg-1 — primary</span></div>
    <div class="row"><span class="dot" style="background:rgba(253,251,247,.68)"></span><span class="t1 on-d">fg-2 — secondary</span></div>
    <div class="row"><span class="dot" style="background:#f0c68c"></span><span class="t1 on-d">accent gold — CTA / script</span></div>
    <div class="row"><span class="dot" style="background:rgba(240,198,140,.16);border:1px solid rgba(240,198,140,.4)"></span><span class="t1 on-d">gold hairline</span></div>
  </div>
</body>
</html>
