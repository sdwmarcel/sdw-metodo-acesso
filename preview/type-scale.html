<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; color:#1b193c; padding:22px 26px; }
  .row { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid #ece5da; }
  .row:last-child { border:0; }
  .tag { width:120px; flex:0 0 auto; font-size:11px; color:#8b8699; font-variant-numeric:tabular-nums; }
  .spec { letter-spacing:-.02em; }
</style>
</head>
<body>
  <div class="row"><span class="tag">h1 · 800 · 48px</span><span class="spec" style="font-size:30px;font-weight:800">Acelere o próximo nível</span></div>
  <div class="row"><span class="tag">h2 · 700 · 36px</span><span class="spec" style="font-size:25px;font-weight:700">O que você ganha</span></div>
  <div class="row"><span class="tag">h3 · 600 · 28px</span><span class="spec" style="font-size:21px;font-weight:600">Três dias, uma região</span></div>
  <div class="row"><span class="tag">body · 400 · 18px</span><span style="font-size:16px;font-weight:400;color:#4b4866">Conexões reais com quem move os negócios da Baixada.</span></div>
  <div class="row"><span class="tag">kicker · 600 · 14px</span><span style="font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#492b92">Edição 2026</span></div>
</body>
</html>
