<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:26px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  .badge { font-size:12.5px; font-weight:600; padding:8px 16px; border-radius:999px; letter-spacing:.02em; }
  .gold { background:#f0c68c; color:#3c165d; }
  .outline-p { border:1.5px solid #492b92; color:#492b92; }
  .soft { background:rgba(73,43,146,.1); color:#492b92; }
  .kicker { font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:#843558; }
  .dot { display:inline-flex; align-items:center; gap:8px; background:#1b193c; color:#fdfbf7; padding:8px 16px; border-radius:999px; font-size:12.5px; font-weight:600; }
  .dot::before { content:""; width:7px; height:7px; border-radius:50%; background:#0f96ab; }
</style>
</head>
<body>
  <span class="badge gold">Edição 2026</span>
  <span class="badge outline-p">Vagas limitadas</span>
  <span class="badge soft">Presencial · Santos</span>
  <span class="dot">Inscrições abertas</span>
  <span class="kicker">Negócios · Inovação</span>
</body>
</html>
