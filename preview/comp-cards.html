<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/poppins.css">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:"Poppins",sans-serif; background:#fbf8f3; padding:24px; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { border-radius:24px; padding:22px; }
  .light { background:#fff; border:1px solid #e7e0d6; box-shadow:0 6px 18px rgba(27,25,60,.10); }
  .dark { background:linear-gradient(150deg,#492b92,#3c165d); box-shadow:0 0 0 1px rgba(240,198,140,.2),0 20px 60px rgba(73,43,146,.45); }
  .num { font-size:28px; font-weight:800; letter-spacing:-.02em; }
  .num.l { color:#492b92; } .num.d { color:#f0c68c; }
  h3 { font-size:17px; font-weight:600; margin:8px 0 5px; }
  .dark h3 { color:#fdfbf7; }
  p { font-size:13px; line-height:1.55; }
  .light p { color:#4b4866; } .dark p { color:rgba(253,251,247,.7); }
</style>
</head>
<body>
  <div class="card light">
    <div class="num l">01</div>
    <h3>Conexões que geram negócio</h3>
    <p>Networking dirigido com líderes e decisores da região.</p>
  </div>
  <div class="card dark">
    <div class="num d">+40</div>
    <h3>Palestras e painéis</h3>
    <p>Conteúdo prático de quem está construindo o futuro da Baixada.</p>
  </div>
</body>
</html>
